<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N74 TEC | Inicialização V2</title>
<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:Arial,sans-serif}
#stars,#matrix{position:fixed;inset:0}
#stars{z-index:0}
#matrix{z-index:1;opacity:.28}
body:before{
content:"";position:fixed;inset:0;z-index:2;pointer-events:none;
background:radial-gradient(circle at center,rgba(0,255,65,.05),rgba(0,0,0,.88));
}
.hero{
position:absolute;inset:0;z-index:10;
display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;padding:20px;
}
.logo{
font-family:'Neuropol',sans-serif;
font-size:clamp(60px,10vw,140px);
letter-spacing:10px;color:#00ff41;
text-shadow:0 0 10px #00ff41,0 0 30px rgba(0,255,65,.8),0 0 60px rgba(0,255,65,.4);
animation:glow 4s infinite ease-in-out;
}
@keyframes glow{
0%,100%{transform:scale(.98);filter:brightness(.85)}
50%{transform:scale(1.02);filter:brightness(1.25)}
}
.subtitle{margin-top:15px;font-size:14px;letter-spacing:4px;color:#d6ffe3}
.loader{
margin-top:40px;width:min(340px,85vw);height:10px;border-radius:20px;overflow:hidden;
background:rgba(255,255,255,.08);border:1px solid rgba(0,255,65,.25)
}
.bar{
height:100%;width:0%;
background:linear-gradient(90deg,#00ff41,#00ffaa,#00ff41);
box-shadow:0 0 20px #00ff41;
}
.status{margin-top:14px;font-size:12px;letter-spacing:2px;color:#9cffba}
.flash{
position:fixed;inset:0;background:#00ff41;opacity:0;pointer-events:none;z-index:50;
}
.fade-out{animation:fadeOut 1s forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(1.05)}}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="matrix"></canvas>
<div class="flash" id="flash"></div>

<div class="hero" id="screen">
<div class="logo">N74 TEC</div>
<div class="subtitle">SISTEMA DE INTELIGÊNCIA ATIVO</div>
<div class="loader"><div class="bar" id="bar"></div></div>
<div class="status" id="status">INICIALIZANDO SISTEMA...</div>
</div>

<script>
const starsCanvas=document.getElementById("stars");
const sctx=starsCanvas.getContext("2d");
let stars=[], angle=0;

function resize(){
starsCanvas.width=innerWidth;
starsCanvas.height=innerHeight;
matrix.width=innerWidth;
matrix.height=innerHeight;

stars=[];
for(let i=0;i<450;i++){
stars.push({
x:(Math.random()-0.5)*innerWidth,
y:(Math.random()-0.5)*innerHeight,
size:Math.random()*2+0.3
});
}
initMatrix();
}
resize();
window.addEventListener('resize',resize);

function drawGalaxy(){
sctx.clearRect(0,0,starsCanvas.width,starsCanvas.height);

const cx=starsCanvas.width/2;
const cy=starsCanvas.height/2;

sctx.save();
sctx.translate(cx,cy);
angle+=0.0008;
sctx.rotate(angle);

const grad=sctx.createRadialGradient(0,0,40,0,0,starsCanvas.width*0.45);
grad.addColorStop(0,'rgba(255,255,255,.18)');
grad.addColorStop(.2,'rgba(120,180,255,.10)');
grad.addColorStop(.5,'rgba(255,255,255,.05)');
grad.addColorStop(1,'rgba(0,0,0,0)');

sctx.fillStyle=grad;
sctx.beginPath();
sctx.ellipse(0,0,starsCanvas.width*.40,starsCanvas.height*.12,0,0,Math.PI*2);
sctx.fill();
sctx.restore();

for(const star of stars){
sctx.fillStyle='rgba(255,255,255,.9)';
sctx.beginPath();
sctx.arc(star.x+cx,star.y+cy,star.size,0,Math.PI*2);
sctx.fill();
}
requestAnimationFrame(drawGalaxy);
}
drawGalaxy();

const matrix=document.getElementById("matrix");
const ctx=matrix.getContext("2d");
const chars="01N74TECABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%";
let drops=[];

function initMatrix(){
drops=Array(Math.floor(matrix.width/16)).fill(1);
}
function drawMatrix(){
ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(0,0,matrix.width,matrix.height);
ctx.fillStyle="#00ff41";
ctx.font="16px monospace";
for(let i=0;i<drops.length;i++){
const t=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(t,i*16,drops[i]*16);
if(drops[i]*16>matrix.height && Math.random()>.98) drops[i]=0;
drops[i]+=0.7;
}
}
setInterval(drawMatrix,45);

const bar=document.getElementById('bar');
const status=document.getElementById('status');
const screen=document.getElementById('screen');
const flash=document.getElementById('flash');

const msgs=[
"INICIALIZANDO SISTEMA...",
"CARREGANDO MÓDULOS DE IA...",
"ESTABELECENDO REDE SEGURA...",
"ANALISANDO AMBIENTE...",
"PREPARANDO INTERFACE...",
"FINALIZANDO BOOT..."
];

let p=0;
const timer=setInterval(()=>{
p++;
bar.style.width=p+'%';

if(p<20)status.textContent=msgs[0];
else if(p<40)status.textContent=msgs[1];
else if(p<60)status.textContent=msgs[2];
else if(p<80)status.textContent=msgs[3];
else if(p<95)status.textContent=msgs[4];
else status.textContent=msgs[5];

if(p>=100){
clearInterval(timer);
flash.style.opacity='0.9';
setTimeout(()=>flash.style.opacity='0',250);
setTimeout(()=>screen.classList.add('fade-out'),300);
setTimeout(()=>location.href='menu.html',1300);
}
},45);

document.addEventListener('click',()=>p=100);
</script>
</body>
</html>
