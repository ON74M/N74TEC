<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>N74 TEC | Soluções de TI em São Paulo</title>

<link rel="canonical" href="https://n74.com.br/">

<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial;
user-select:none;
}

/* MATRIX BACKGROUND */
canvas{
position:fixed;
inset:0;
z-index:0;
}

/* DARK OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(0,255,65,0.08), rgba(0,0,0,0.95));
z-index:1;
}

/* CENTER */
.hero{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

/* LOGO */
.logo{
font-family:'Neuropol',sans-serif;
font-size:clamp(60px,10vw,140px);
letter-spacing:10px;
color:#00ff41;
text-shadow:
0 0 10px #00ff41,
0 0 30px #00ff41,
0 0 60px rgba(0,255,65,0.4);

animation:glow 3s infinite ease-in-out;
}

@keyframes glow{
0%{filter:brightness(0.8); transform:scale(0.98);}
50%{filter:brightness(1.4); transform:scale(1.02);}
100%{filter:brightness(0.8); transform:scale(0.98);}
}

/* SUBTITLE */
.subtitle{
margin-top:15px;
font-size:14px;
letter-spacing:5px;
color:#c5ffd7;
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:1.5s;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* LOADING BAR AREA */
.loader{
margin-top:40px;
width:320px;
height:10px;
background:rgba(0,255,65,0.1);
border:1px solid rgba(0,255,65,0.3);
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,255,65,0.2);
}

/* BAR */
.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00ff41,#00ffaa,#00ff41);
box-shadow:0 0 15px #00ff41;
transition:width 0.15s linear;
}

/* STATUS TEXT */
.status{
margin-top:10px;
font-size:12px;
color:#00ff41;
letter-spacing:2px;
opacity:0.8;
}

/* FADE OUT TRANSITION */
.fade-out{
animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
to{
opacity:0;
transform:scale(1.05);
}
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="hero" id="screen">

<div class="logo">N74 TEC</div>

<div class="subtitle">SISTEMA DE INTELIGÊNCIA ATIVO</div>

<div class="loader">
  <div class="bar" id="bar"></div>
</div>

<div class="status" id="status">INICIALIZANDO SISTEMA...</div>

</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();

const chars="01N74TEC@#$%ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let drops=[];

function init(){
drops=Array(Math.floor(canvas.width/15)).fill(1);
}
init();

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff41";
ctx.font="15px monospace";

for(let i=0;i<drops.length;i++){
let t=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(t,i*15,drops[i]*15);

if(drops[i]*15>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]+=0.75;
}
}

setInterval(draw,45);

window.addEventListener("resize",()=>{
resize();
init();
});

/* 🚀 LOADING SYSTEM */
const bar=document.getElementById("bar");
const status=document.getElementById("status");
const screen=document.getElementById("screen");

let progress=0;

const messages=[
"INICIALIZANDO SISTEMA...",
"CARREGANDO MÓDULOS DE IA...",
"ESTABELECENDO REDE SEGURA...",
"ANALISANDO AMBIENTE...",
"PREPARANDO INTERFACE...",
"FINALIZANDO BOOT..."
];

function updateStatus(p){
if(p<20) status.textContent=messages[0];
else if(p<40) status.textContent=messages[1];
else if(p<60) status.textContent=messages[2];
else if(p<80) status.textContent=messages[3];
else if(p<95) status.textContent=messages[4];
else status.textContent=messages[5];
}

let loader=setInterval(()=>{

progress++;

bar.style.width=progress+"%";
updateStatus(progress);

if(progress>=100){
clearInterval(loader);

/* efeito final cinema */
screen.classList.add("fade-out");

setTimeout(()=>{
window.location.href="menu.html";
},1000);
}

},40);

/* clique pula */
document.addEventListener("click",()=>{
progress=100;
});

</script>

</body>
</html>
