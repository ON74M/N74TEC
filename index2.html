<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>N74 TEC | Inicialização</title>

<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

/* MATRIX */

canvas{
position:fixed;
inset:0;
z-index:0;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.70);
z-index:1;
}

/* BOOT */

.boot{
position:absolute;
inset:0;
z-index:20;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

color:#00ff41;
font-family:monospace;

font-size:18px;

animation:fadeBoot 6s forwards;
}

.line{
opacity:0;
margin:6px 0;
animation:showLine .5s forwards;
}

.line:nth-child(1){animation-delay:.5s;}
.line:nth-child(2){animation-delay:1.5s;}
.line:nth-child(3){animation-delay:2.5s;}
.line:nth-child(4){animation-delay:3.5s;}

@keyframes showLine{
to{
opacity:1;
}
}

@keyframes fadeBoot{
0%,80%{
opacity:1;
}

100%{
opacity:0;
pointer-events:none;
}
}

/* LOGO */

.hero{
position:absolute;
inset:0;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

z-index:10;

opacity:0;
animation:showHero 2s ease forwards;
animation-delay:5s;
}

.logo{

font-family:'Neuropol',sans-serif;

font-size:clamp(60px,10vw,140px);

color:#00ff41;

letter-spacing:8px;

text-shadow:
0 0 10px #00ff41,
0 0 20px #00ff41,
0 0 40px #00ff41,
0 0 60px #00ff41;

animation:glowPulse 4s infinite;
}

.subtitle{

margin-top:20px;

font-size:14px;

letter-spacing:5px;

color:#c5ffd7;

min-height:20px;
}

@keyframes showHero{

from{
opacity:0;
transform:scale(.95);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes glowPulse{

0%{
text-shadow:
0 0 10px #006600,
0 0 20px #00aa33;
}

50%{
text-shadow:
0 0 20px #00ff41,
0 0 40px #00ff41,
0 0 80px #00ff41;
}

100%{
text-shadow:
0 0 10px #006600,
0 0 20px #00aa33;
}

}

/* REFLEXO */

.logo::after{
content:"";
position:absolute;
}

/* NAVBAR */

.navbar{

position:fixed;

bottom:-80px;
left:0;

width:100%;

height:60px;

background:rgba(0,0,0,.92);

border-top:1px solid rgba(0,255,65,.20);

display:flex;
justify-content:space-between;
align-items:center;

padding:0 30px;

z-index:30;

animation:showNav 1s forwards;
animation-delay:7s;
}

@keyframes showNav{

to{
bottom:0;
}

}

.nav-btn{

color:#fff;
font-size:22px;
cursor:pointer;

transition:.3s;
}

.nav-btn:hover{
color:#00ff41;
}

.center{

font-family:'Neuropol',sans-serif;
font-size:14px;
letter-spacing:4px;
color:#00ff41;
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<!-- BOOT -->

<div class="boot">

<div class="line">[ N74 TEC SYSTEM ]</div>

<div class="line">LOADING NETWORK MODULE... OK</div>

<div class="line">LOADING SECURITY MODULE... OK</div>

<div class="line">WELCOME TO N74 TEC</div>

</div>

<!-- HERO -->

<div class="hero">

<div class="logo">
N74 TEC
</div>

<div class="subtitle" id="subtitle"></div>

</div>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-btn">
☰
</div>

<div class="center">
HOME
</div>

<div class="nav-btn">
☎
</div>

</div>

<script>

/* MATRIX */

const canvas =
document.getElementById("matrix");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

const chars =
"01N74TEC@#$%ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const fontSize = 15;

let columns;
let drops=[];

function init(){

columns =
Math.floor(canvas.width/fontSize);

drops=[];

for(let i=0;i<columns;i++){
drops.push(1);
}

}

init();

function draw(){

ctx.fillStyle =
"rgba(0,0,0,0.04)";

ctx.fillRect(
0,
0,
canvas.width,
canvas.height
);

ctx.fillStyle =
"#00ff41";

ctx.font =
fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text =
chars[
Math.floor(
Math.random()*chars.length
)
];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize >
canvas.height &&
Math.random() > 0.975
){
drops[i]=0;
}

drops[i]+=0.75;

}

}

setInterval(draw,45);

window.addEventListener(
"resize",
()=>{
resize();
init();
}
);

/* DIGITAÇÃO */

const texto =
"SUPORTE TÉCNICO PROFISSIONAL";

const subtitle =
document.getElementById("subtitle");

setTimeout(()=>{

let i=0;

const timer =
setInterval(()=>{

subtitle.textContent +=
texto.charAt(i);

i++;

if(i>=texto.length){
clearInterval(timer);
}

},70);

},6000);

</script>

</body>

</html>
