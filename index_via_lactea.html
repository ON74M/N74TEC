<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>N74 TEC | Inicialização</title>

<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

/* VIA LÁCTEA */
#stars{
position:fixed;
inset:0;
z-index:0;
}

/* MATRIX */
#matrix{
position:fixed;
inset:0;
z-index:1;
opacity:.28;
}

/* OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at center,
rgba(0,255,65,.05),
rgba(0,0,0,.82));
z-index:2;
pointer-events:none;
}

/* HERO */
.hero{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
text-align:center;
padding:20px;
}

/* LOGO */
.logo{
font-family:'Neuropol',sans-serif;
font-size:clamp(60px,10vw,140px);
letter-spacing:10px;

color:#00ff41;

text-shadow:
0 0 10px #00ff41,
0 0 30px rgba(0,255,65,.8),
0 0 60px rgba(0,255,65,.4);

animation:glow 4s infinite ease-in-out;
}

@keyframes glow{

0%{
transform:scale(.98);
filter:brightness(.85);
}

50%{
transform:scale(1.02);
filter:brightness(1.25);
}

100%{
transform:scale(.98);
filter:brightness(.85);
}

}

.subtitle{
margin-top:15px;
font-size:14px;
letter-spacing:4px;
color:#d6ffe3;
}

/* LOADER */

.loader{
margin-top:40px;

width:min(340px,85vw);
height:10px;

background:rgba(255,255,255,.08);

border-radius:30px;

overflow:hidden;

border:1px solid rgba(0,255,65,.25);
}

.bar{
height:100%;
width:0%;

background:
linear-gradient(
90deg,
#00ff41,
#00ffaa,
#00ff41
);

box-shadow:0 0 20px #00ff41;
}

.status{
margin-top:14px;
font-size:12px;
letter-spacing:2px;
color:#9cffba;
}

/* FADE */

.fade-out{
animation:fadeOut 1s forwards;
}

@keyframes fadeOut{
to{
opacity:0;
transform:scale(1.05);
}
}

</style>

</head>

<body>

<canvas id="stars"></canvas> <canvas id="matrix"></canvas>

<div class="hero" id="screen">

<div class="logo">N74 TEC</div>

<div class="subtitle">
SISTEMA DE INTELIGÊNCIA ATIVO
</div>

<div class="loader">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status">
INICIALIZANDO SISTEMA...
</div>

</div>

<script>

/* ==========================
   VIA LÁCTEA CINEMA
========================== */

const starsCanvas=document.getElementById("stars");
const sctx=starsCanvas.getContext("2d");

let stars=[];

function resizeStars(){

starsCanvas.width=innerWidth;
starsCanvas.height=innerHeight;

stars=[];

for(let i=0;i<350;i++){

stars.push({

x:Math.random()*starsCanvas.width,
y:Math.random()*starsCanvas.height,

size:Math.random()*2,

speed:0.2+Math.random()*1.4

});

}

}

resizeStars();

function drawGalaxy(){

sctx.clearRect(
0,
0,
starsCanvas.width,
starsCanvas.height
);

/* nebulosa */

const grad=sctx.createRadialGradient(
starsCanvas.width/2,
starsCanvas.height/2,
50,

starsCanvas.width/2,
starsCanvas.height/2,
starsCanvas.width*0.8
);

grad.addColorStop(0,"rgba(255,255,255,.10)");
grad.addColorStop(0.3,"rgba(80,120,255,.06)");
grad.addColorStop(0.6,"rgba(255,255,255,.03)");
grad.addColorStop(1,"rgba(0,0,0,0)");

sctx.fillStyle=grad;
sctx.fillRect(
0,
0,
starsCanvas.width,
starsCanvas.height
);

/* estrelas */

for(let star of stars){

sctx.beginPath();

sctx.fillStyle=
`rgba(255,255,255,${
0.4+Math.random()*0.6
})`;

sctx.arc(
star.x,
star.y,
star.size,
0,
Math.PI*2
);

sctx.fill();

star.y+=star.speed;

if(star.y>starsCanvas.height){

star.y=-10;
star.x=Math.random()*starsCanvas.width;

}

}

requestAnimationFrame(drawGalaxy);

}

drawGalaxy();

/* ==========================
   MATRIX
========================== */

const matrix=document.getElementById("matrix");
const ctx=matrix.getContext("2d");

let drops=[];
const chars=
"01N74TECABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%";

function resizeMatrix(){

matrix.width=innerWidth;
matrix.height=innerHeight;

drops=
Array(
Math.floor(matrix.width/16)
).fill(1);

}

resizeMatrix();

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,.05)";
ctx.fillRect(
0,
0,
matrix.width,
matrix.height
);

ctx.fillStyle="#00ff41";
ctx.font="16px monospace";

for(let i=0;i<drops.length;i++){

const txt=
chars[
Math.floor(
Math.random()*chars.length
)
];

ctx.fillText(
txt,
i*16,
drops[i]*16
);

if(
drops[i]*16>matrix.height &&
Math.random()>0.98
){
drops[i]=0;
}

drops[i]+=0.7;

}

}

setInterval(drawMatrix,45);

window.addEventListener(
"resize",
()=>{
resizeStars();
resizeMatrix();
}
);

/* ==========================
   LOADER
========================== */

const bar=document.getElementById("bar");
const status=document.getElementById("status");
const screen=document.getElementById("screen");

let progress=0;

const messages=[

"INICIALIZANDO SISTEMA...",
"CARREGANDO MÓDULOS DE IA...",
"ESTABELECENDO REDE SEGURA...",
"ANALISANDO AMBIENTE...",
"PREPARANDO INTERFACE...",
"FINALIZANDO BOOT..."

];

function updateStatus(p){

if(p<20)
status.textContent=messages[0];

else if(p<40)
status.textContent=messages[1];

else if(p<60)
status.textContent=messages[2];

else if(p<80)
status.textContent=messages[3];

else if(p<95)
status.textContent=messages[4];

else
status.textContent=messages[5];

}

let loader=setInterval(()=>{

progress++;

bar.style.width=
progress+"%";

updateStatus(progress);

if(progress>=100){

clearInterval(loader);

screen.classList.add("fade-out");

setTimeout(()=>{

window.location.href="menu.html";

},1000);

}

},45);

/* clique pula */

document.addEventListener(
"click",
()=>{
progress=100;
}
);

</script>

</body>
</html>
