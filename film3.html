<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>N74 TEC | Inicialização</title>

<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial;
user-select:none;
}

/* MATRIX */
canvas{
position:fixed;
inset:0;
z-index:0;
}

body::before{
content:"";
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:1;
}

/* CENTRO */
.hero{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

/* LOGO FINAL */
.logo{
font-family:'Neuropol',sans-serif;
font-size:clamp(60px,10vw,140px);
letter-spacing:10px;
color:#00ff41;
text-shadow:0 0 20px #00ff41;
}

/* LETRAS */
.letter{
display:inline-block;
opacity:0;

/* posição inicial */
transform:translate(var(--x), var(--y)) scale(0.3) rotate(180deg);

/* duas animações permanentes */
animation:
enter 1.2s cubic-bezier(.2,.8,.2,1) forwards,
alive 3s ease-in-out infinite;
}

/* ENTRADA */
@keyframes enter{
to{
opacity:1;
transform:translate(0,0) scale(1) rotate(0deg);
}
}

/* VIDA CONTÍNUA (NUNCA PARAR) */
@keyframes alive{

0%{
transform:translate(0,0) rotate(0deg);
filter:brightness(0.9);
}

25%{
transform:translate(1px,-3px) rotate(1deg);
filter:brightness(1.1);
}

50%{
transform:translate(-1px,2px) rotate(-1deg);
filter:brightness(1.3);
}

75%{
transform:translate(2px,1px) rotate(2deg);
filter:brightness(1.05);
}

100%{
transform:translate(0,0) rotate(0deg);
filter:brightness(0.9);
}

}

/* SUBTITLE */
.subtitle{
margin-top:20px;
font-size:14px;
letter-spacing:5px;
color:#c5ffd7;
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:3s;
}

@keyframes fadeIn{
to{opacity:1;}
}

</style>

</head>

<body>

<canvas id="matrix"></canvas>

<div class="hero">

<div class="logo" id="logo">
  <span class="letter">N</span>
  <span class="letter">7</span>
  <span class="letter">4</span>
  <span class="letter"> </span>
  <span class="letter">T</span>
  <span class="letter">E</span>
  <span class="letter">C</span>
</div>

<div class="subtitle">SUPORTE TÉCNICO PROFISSIONAL</div>

</div>

<script>

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();

const chars="01N74TEC@#$%ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let drops=[];

function init(){
drops=Array(Math.floor(canvas.width/15)).fill(1);
}
init();

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff41";
ctx.font="15px monospace";

for(let i=0;i<drops.length;i++){
let t=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(t,i*15,drops[i]*15);

if(drops[i]*15>canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]+=0.75;
}
}

setInterval(draw,45);

window.addEventListener("resize",()=>{
resize();
init();
});

/* 🎬 LETRAS VOANDO */
const letters=document.querySelectorAll(".letter");

letters.forEach((el,i)=>{

let x=(Math.random()*900-450)+"px";
let y=(Math.random()*500-250)+"px";

el.style.setProperty("--x",x);
el.style.setProperty("--y",y);

el.style.animationDelay=(i*0.2)+"s";

});

/* 🚀 IR PARA MENU */
function goMenu(){
document.body.style.transition="1s";
document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="menu.html";
},900);
}

document.addEventListener("click",goMenu);
setTimeout(goMenu,8000);

</script>

</body>
</html>
