<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>N74 TEC | Contato</title>

<link href="https://fonts.cdnfonts.com/css/neuropol-2" rel="stylesheet">

<style>

/* RESET */
*{
box-sizing:border-box;
}

body{
margin:0;
background:#000;
font-family:'Neuropol',sans-serif;
color:#00ff41;
overflow-x:hidden;
}

/* MATRIX */
canvas{
position:fixed;
inset:0;
z-index:0;
opacity:0.12;
}

/* HEADER */
header{
position:relative;
z-index:2;
text-align:center;
padding:25px 10px;
}

header h1{
margin:0;
font-size:32px;
letter-spacing:6px;
text-shadow:0 0 10px rgba(0,255,65,0.3);
}

header p{
font-size:11px;
opacity:0.7;
font-family:Arial;
}

/* BOX PRINCIPAL */
.box{
position:relative;
z-index:2;
max-width:520px;
margin:40px auto;
padding:25px;
text-align:center;

background:rgba(0,255,65,0.04);
border:1px solid rgba(0,255,65,0.2);
border-radius:14px;
backdrop-filter:blur(8px);
box-shadow:0 0 25px rgba(0,255,65,0.05);
}

/* TEXTO */
.box p{
font-family:Arial;
font-size:13px;
opacity:0.85;
line-height:1.5;
}

/* BOTÃO WHATSAPP */
.btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;

margin-top:18px;
padding:14px;
border-radius:10px;
cursor:pointer;

font-family:Arial;
font-size:14px;

transition:0.2s;

border:1px solid rgba(0,255,65,0.4);
background:rgba(0,255,65,0.08);
color:#00ff41;
}

.btn:hover{
background:rgba(0,255,65,0.18);
}

.btn:active{
transform:scale(0.97);
}

/* MAPA */
.map{
max-width:520px;
margin:20px auto;
padding:15px;
background:rgba(0,255,65,0.03);
border:1px solid rgba(0,255,65,0.15);
border-radius:14px;
backdrop-filter:blur(8px);
}

iframe{
width:100%;
height:240px;
border:0;
border-radius:10px;
filter:invert(1) hue-rotate(90deg) contrast(1.1);
}

/* FOOTER */
footer{
text-align:center;
font-size:10px;
opacity:0.5;
padding:15px;
font-family:Arial;
border-top:1px solid rgba(0,255,65,0.1);
margin-top:20px;
}

/* RESPONSIVO */
@media (max-width:768px){
header h1{
font-size:24px;
}
.box, .map{
margin:15px;
}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<header>
<h1>CONTATO</h1>
<p>N74 TEC • Suporte Técnico e Infraestrutura</p>
</header>

<div class="box">

<p>
Atendimento rápido via WhatsApp direto com a equipe técnica.<br>
Suporte em redes, servidores, CFTV e infraestrutura.
</p>

<div class="btn" onclick="whats()">
💬 WHATSAPP
</div>

</div>

<!-- MAPA -->
<div class="map">

<iframe
src="https://www.google.com/maps?q=São+Paulo&output=embed">
</iframe>

</div>

<footer>
N74 TEC © 2026 • Sistema de contato ativo
</footer>

<script>

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01N74TECIA@#$%&";
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(1);

function draw(){
ctx.fillStyle = "rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#00ff41";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){
let text = chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text, i*fontSize, drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.98){
drops[i]=0;
}
drops[i]+=0.30;
}
}

setInterval(draw, 40);

/* WHATSAPP */
function whats(){
window.open("https://wa.me/5511958733142?text=Olá! Gostaria de atendimento da N74 TEC", "_blank");
}

</script>

</body>
</html>
